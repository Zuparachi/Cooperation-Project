services:
  mongo:
    image: mongo:4.4
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 1234
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: 1234
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: 1234
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - app_network

  fastapi-backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    container_name: fastapi-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    networks:
      - app_network

  react-frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    container_name: react-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - fastapi-backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
